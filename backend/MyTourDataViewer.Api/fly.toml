# fly.toml – Fly.io configuration for the MyTourDataViewer backend
#
# Deploy from this directory:
#   cd backend/MyTourDataViewer.Api
#   fly deploy
#
# Before the first deploy:
#   fly apps create mytour-backend          # or choose your own name
#   fly secrets set Jwt__Key="$(openssl rand -base64 32)"
#   fly secrets set ConnectionStrings__Postgres="<your-fly-postgres-connection-string>"
#   fly secrets set CORS_ORIGINS="https://mytour-frontend.fly.dev"
#
# Attach a Fly Postgres cluster:
#   fly postgres create --name mytour-db
#   fly postgres attach mytour-db --app mytour-backend --variable-name ConnectionStrings__Postgres

app            = "mytour-backend"
primary_region = "iad"

[build]
  # Dockerfile is in the same directory as this fly.toml

[env]
  PORT          = "8080"
  DbProvider    = "postgres"
  Jwt__Issuer   = "MyTourDataViewer"
  Jwt__Audience = "MyTourDataViewerClients"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "15s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    timeout      = "10s"

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
