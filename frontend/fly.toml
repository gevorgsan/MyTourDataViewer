# fly.toml – Fly.io configuration for the MyTourDataViewer frontend
#
# Deploy from this directory:
#   cd frontend
#   fly deploy
#
# Before the first deploy:
#   fly apps create mytour-frontend         # or choose your own name
#
# Update BACKEND_URL below to match your actual backend app name.
# If the backend app name differs from "mytour-backend", change the URL.

app            = "mytour-frontend"
primary_region = "iad"

[build]
  # Dockerfile is in the same directory as this fly.toml

[env]
  PORT        = "8080"
  BACKEND_URL = "https://mytour-backend.fly.dev"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
