server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Redirect bare /api to /api/ so the location block below always matches.
    location = /api {
        return 301 /api/;
    }

    location /api/ {
        # Direct proxy_pass with a URI component — nginx replaces the matched
        # /api/ prefix with /api/ on the upstream, preserving the rest of the
        # path.  No `set $backend` variable trick needed; DNS is resolved once
        # at config-load time, which is fine because *.onrender.com always
        # resolves (even when the service is sleeping).
        proxy_pass            https://${BACKEND_HOST}/api/;

        # Use HTTP/1.1 for the upstream connection; the default HTTP/1.0
        # causes 502 Bad Gateway when proxying through Render's HTTPS edge
        # because HTTP/1.0 lacks proper keep-alive and chunked-transfer
        # support that Render's load balancer expects.
        proxy_http_version    1.1;

        proxy_ssl_server_name on;
        proxy_set_header    Host              ${BACKEND_HOST};
        proxy_set_header    Connection        "";
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        # Increase proxy buffer sizes so nginx can handle larger upstream
        # responses (e.g. JWT tokens, verbose error payloads) without
        # returning 502 due to an oversized header or body chunk.
        proxy_buffer_size       16k;
        proxy_buffers           4 32k;
        proxy_busy_buffers_size 32k;

        # Render free-tier backend sleeps after 15 min; allow up to 120 s
        # for a cold-start wake-up before nginx returns 502/504.
        proxy_connect_timeout 120s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }
}
