server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # NGINX_RESOLVER is the system nameserver extracted at container start (see Dockerfile).
    # Using a variable in proxy_pass forces per-request DNS resolution instead of
    # startup-time resolution, which avoids "host not found in upstream" errors when
    # the backend container/service isn't resolvable yet at nginx launch.
    # 8.8.8.8 and 1.1.1.1 are public fallback resolvers for cases where the container's
    # system nameserver cannot reach or resolve public *.onrender.com hostnames.
    # These are only used to resolve the backend's public onrender.com URL — no internal
    # service names are exposed via this path.
    # ipv6=off prevents nginx from attempting AAAA lookups, which can fail or stall
    # in some Render container network configurations.
    resolver ${NGINX_RESOLVER} 8.8.8.8 1.1.1.1 valid=30s ipv6=off;

    # Proxy API calls to the backend.
    # BACKEND_URL, BACKEND_HOST, and NGINX_RESOLVER are injected at container start
    # via envsubst (see Dockerfile).
    location /api/ {
        # Respond to CORS preflight requests directly without forwarding to the
        # backend.  This guarantees a valid preflight response even when the
        # backend's CORS_ORIGINS is mis-configured or when the backend is still
        # waking from a cold-start.
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age'       86400;
            add_header 'Content-Length'               0;
            return 204;
        }

        set $backend ${BACKEND_URL};
        proxy_pass $backend$request_uri;
        proxy_http_version 1.1;
        # Clear Connection header so hop-by-hop headers are not forwarded to the
        # upstream; required for correct HTTP/1.1 keep-alive with HTTPS upstreams.
        proxy_set_header Connection "";
        # Required for HTTPS upstreams on Render: sends SNI so the edge can
        # route to the correct service and present the right TLS certificate.
        proxy_ssl_server_name on;
        # Use the backend's own hostname so Render's router forwards the
        # request to the backend service, not back to the frontend.
        proxy_set_header Host ${BACKEND_HOST};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        # Extended timeouts to absorb Render free-tier cold-start latency
        # (services can take 30–90 s to wake from idle).
        proxy_connect_timeout 90s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;

        # Strip any CORS headers returned by the upstream so that nginx's own
        # header (added below) is the single authoritative value seen by the
        # browser.  Duplicate Access-Control-Allow-Origin headers cause browsers
        # to reject responses outright.
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;

        # Reflect the request's Origin back so any legitimate cross-origin caller
        # is not blocked.  The API uses JWT bearer tokens (not cookies), so there
        # is no CSRF risk from a permissive CORS origin policy.
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # React SPA — fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
