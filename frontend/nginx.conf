server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Resolve upstream hostnames at request time (not config-load time) so
    # nginx can start even when the backend is not yet reachable.
    resolver ${DNS_RESOLVER} valid=30s;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        set $backend https://${BACKEND_HOST};
        proxy_pass          $backend;
        proxy_ssl_server_name on;
        proxy_set_header    Host              ${BACKEND_HOST};
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        # Render free-tier backend sleeps after 15 min; allow up to 120 s
        # for a cold-start wake-up before nginx returns 502/504.
        proxy_connect_timeout 120s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }
}
