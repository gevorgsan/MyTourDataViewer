server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # NGINX_RESOLVER is the system nameserver extracted at container start (see Dockerfile).
    # Using a variable in proxy_pass forces per-request DNS resolution instead of
    # startup-time resolution, which avoids "host not found in upstream" errors when
    # the backend container/service isn't resolvable yet at nginx launch.
    resolver ${NGINX_RESOLVER} valid=30s;

    # Proxy API calls to the backend.
    # BACKEND_URL and NGINX_RESOLVER are injected at container start via envsubst (see Dockerfile).
    location /api/ {
        set $backend ${BACKEND_URL};
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Angular SPA — fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
