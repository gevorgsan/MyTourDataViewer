<div class="overview-container">

  <div class="layout">

    <!-- Left panel: system info -->
    <aside class="api-list">
      <h3>About This App</h3>
      <p class="system-info">This app allows users to view MyTour requests and booking history.</p>
    </aside>

    <!-- Right panel: data viewer -->
    <section class="data-panel">

      <ng-container *ngIf="selectedApiId == null">
        <p class="hint">← Select an API from the list to view its data.</p>
      </ng-container>

      <ng-container *ngIf="selectedApiId != null">
        <h3>{{ selectedApi?.name }}</h3>

        <div class="controls">
          <label>
            Endpoint
            <select [(ngModel)]="selectedEndpoint" *ngIf="endpointOptions.length > 0">
              <option *ngFor="let ep of endpointOptions" [value]="ep">{{ ep }}</option>
            </select>
            <input *ngIf="endpointOptions.length === 0"
                   type="text"
                   [(ngModel)]="selectedEndpoint"
                   placeholder="/path (optional)" />
          </label>
          <button class="btn btn-primary" (click)="fetchData()" [disabled]="dataState === 'loading'">
            {{ dataState === 'loading' ? 'Loading…' : 'Fetch Data' }}
          </button>
        </div>

        <!-- States -->
        <div *ngIf="dataState === 'loading'" class="state-msg">Fetching data…</div>

        <div *ngIf="dataState === 'error'" class="state-msg error">
          <strong>Error:</strong> {{ errorMessage }}
        </div>

        <div *ngIf="dataState === 'success'" class="result">
          <div class="result-header">
            <span class="badge success">✔ Success</span>
          </div>
          <pre class="result-body">{{ dataJson }}</pre>
        </div>
      </ng-container>

    </section>
  </div>
</div>
