<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <span class="login-logo">&#9685;</span>
      <h1>MyTourDataViewer</h1>
      <p class="login-subtitle">Sign in to your account</p>
    </div>

    <form class="login-form" (ngSubmit)="submit()">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" name="username" placeholder="Enter your username" autocomplete="username" [(ngModel)]="credentials.username" [disabled]="isSubmitting" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" placeholder="Enter your password" autocomplete="current-password" [(ngModel)]="credentials.password" [disabled]="isSubmitting" />
      </div>

      <p *ngIf="isRetrying" class="login-info" aria-live="polite">Server is starting up. Please wait&hellip;</p>

      <p *ngIf="errorMessage" class="login-error">{{ errorMessage }}</p>

      <button type="submit" class="btn-signin" [disabled]="isSubmitting">
        {{ isRetrying ? 'Waiting for server...' : (isSubmitting ? 'Signing In...' : 'Sign In') }}
      </button>
    </form>

    <p class="login-footer">MyTourDataViewer &copy; {{ year }}</p>
  </div>
</div>
