# render.yaml – Render Blueprint (Infrastructure as Code)
# https://render.com/docs/blueprint-spec
#
# Usage: Connect your GitHub repo to Render → New → Blueprint.
# Render will provision the database, backend, and frontend automatically.
#
# ─── Cost summary (as of 2025) ────────────────────────────────────────────────
#  Free plan web services : sleep after 15 min of inactivity (30–60 s cold start)
#  Free plan static sites : always-on, no sleep, no Docker needed
#  Free plan PostgreSQL   : deleted after 90 days → upgrade to Basic ($7/mo)
#  Starter web services   : $7/mo each — always-on, no sleep
# ──────────────────────────────────────────────────────────────────────────────

databases:
  - name: mytour-db
    databaseName: mytourviewer
    user: mytour
    plan: free
    region: oregon

services:
  # ── Backend (ASP.NET Core 10 Web API) ────────────────────────────────────────
  - type: web
    name: mytour-backend
    region: oregon
    plan: free          # change to "starter" ($7/mo) to eliminate cold-start delays
    runtime: docker
    dockerfilePath: backend/MyTourDataViewer.Api/Dockerfile
    dockerContext: backend/MyTourDataViewer.Api
    healthCheckPath: /health
    envVars:
      - key: DbProvider
        value: postgres

      # Render injects the managed database connection string automatically.
      - key: ConnectionStrings__Postgres
        fromDatabase:
          name: mytour-db
          property: connectionString

      # Render generates a cryptographically secure random value on first deploy.
      - key: Jwt__Key
        generateValue: true

      - key: Jwt__Issuer
        value: MyTourDataViewer

      - key: Jwt__Audience
        value: MyTourDataViewerClients

      # Allow requests from the frontend web service.
      # property: host returns a bare hostname (e.g. mytour-frontend.onrender.com);
      # Program.cs prepends https:// when no scheme is present.
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: mytour-frontend
          property: host

  # ── Frontend (React + Vite + nginx — Render Docker Web Service) ──────────────
  # nginx proxies /api to the backend, so the React app uses relative /api paths
  # with no CORS issues and no need to embed the backend URL at build time.
  - type: web
    name: mytour-frontend
    region: oregon
    plan: free          # change to "starter" ($7/mo) to eliminate cold-start delays
    runtime: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    envVars:
      # property: host returns a bare hostname (e.g. mytour-backend.onrender.com);
      # nginx.conf uses it directly in the upstream proxy_pass directive.
      - key: BACKEND_HOST
        fromService:
          type: web
          name: mytour-backend
          property: host
